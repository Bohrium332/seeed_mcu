esphome:
  name: ws2812b_test
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: wsstrip
          brightness: 20%
          effect: "Rainbow"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:

# ================================
# WS2812B 基础设置
# ================================
light:
  - platform: fastled_clockless # 无时钟灯带
    chipset: WS2812B
    pin: GPIO3
    num_leds: 24
    rgb_order: GRB
    name: "ws2812b_strip"
    id: wsstrip
    restore_mode: ALWAYS_ON
    # 声明可用的灯光效果列表
    effects:
      - addressable_rainbow:
          name: Rainbow
          speed: 100
          width: 24


# 灯光效果：
